name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  # ------------------------------------------------------------------
  # Job 1: Unit tests. Pure-data parsers (audio_parser, icons) — no
  # layer-shell or KWin dependency. Runs on plain Ubuntu noble with Qt6.
  # ------------------------------------------------------------------
  unit-tests:
    name: Unit tests (Ubuntu, Qt6)
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Qt 6 base + test deps
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            qmake6 \
            qt6-base-dev \
            qt6-base-dev-tools \
            libqt6test6 \
            build-essential

      - name: Verify Qt version
        run: qmake6 -query QT_VERSION

      - name: Build + run unit tests
        env:
          QT_QPA_PLATFORM: offscreen
        run: |
          cd tests
          qmake6 tests.pro
          make -j$(nproc)
          for t in audio_parser_test/audio_parser_test icons_test/icons_test; do
            echo "::group::Running $t"
            ./$t
            echo "::endgroup::"
          done

  # ------------------------------------------------------------------
  # Job 2: Best-effort full build. Plasma 6 Qt6 layer-shell-qt-dev isn't
  # in Ubuntu noble's main repo — we add the Kubuntu backports PPA.
  # If the PPA fails to install layer-shell-qt6, the job is marked as
  # failing — useful signal but doesn't block merges.
  # ------------------------------------------------------------------
  full-build:
    name: Full build (Ubuntu, best-effort)
    runs-on: ubuntu-24.04
    continue-on-error: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Add Kubuntu backports PPA (Plasma 6 / Qt6 layer-shell-qt)
        run: |
          sudo add-apt-repository -y ppa:kubuntu-ppa/backports
          sudo apt-get update

      - name: Install build deps
        run: |
          sudo apt-get install -y --no-install-recommends \
            qmake6 \
            qt6-base-dev \
            qt6-base-dev-tools \
            qt6-l10n-tools \
            qt6-wayland-dev \
            qt6-wayland-dev-tools \
            libqt6test6 \
            libqt6opengl6-dev \
            libxkbcommon-dev \
            libwayland-dev \
            libxcb1-dev \
            libxcb-ewmh-dev \
            layer-shell-qt-dev \
            network-manager \
            pipewire-pulse \
            build-essential

      - name: Compile translations
        run: |
          lrelease6 translations/4ztexDock_tr.ts translations/4ztexDock_en.ts \
            || lrelease-qt6 translations/4ztexDock_tr.ts translations/4ztexDock_en.ts

      - name: Build main app
        run: |
          qmake6 4ztexDock.pro
          make -j$(nproc) 2>&1 | tee /tmp/build.log

      - name: Fail on warnings
        run: |
          if grep -q "warning:" /tmp/build.log; then
            echo "::error::Build produced compiler warnings"
            grep "warning:" /tmp/build.log
            exit 1
          fi
