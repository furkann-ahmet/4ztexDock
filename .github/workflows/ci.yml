name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build-and-test:
    name: Build + Unit Tests (Ubuntu)
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Qt 6 and build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            qmake6 \
            qt6-base-dev \
            qt6-base-dev-tools \
            qt6-l10n-tools \
            qt6-wayland-dev \
            qt6-wayland-dev-tools \
            libqt6dbus6 \
            libqt6network6 \
            libqt6test6 \
            libqt6widgets6 \
            libqt6opengl6-dev \
            libxkbcommon-dev \
            libwayland-dev \
            libwayland-client0 \
            layer-shell-qt-dev \
            networkmanager \
            pipewire-pulse \
            build-essential

      - name: Verify Qt version
        run: qmake6 -query QT_VERSION

      - name: Build main app
        run: |
          lrelease6 translations/4ztexDock_tr.ts translations/4ztexDock_en.ts
          qmake6 4ztexDock.pro
          make -j$(nproc)

      - name: Build + run unit tests
        env:
          QT_QPA_PLATFORM: offscreen
        run: |
          cd tests
          qmake6 tests.pro
          make -j$(nproc)
          # Her test binary'sini sırayla çalıştır.
          for t in audio_parser_test/audio_parser_test icons_test/icons_test; do
            echo "::group::Running $t"
            ./$t
            echo "::endgroup::"
          done

      - name: Fail on warnings (main)
        run: |
          cd "$GITHUB_WORKSPACE"
          make clean
          qmake6 4ztexDock.pro
          # 2>&1 ile stderr'i yakala; grep warning satırı varsa exit 1
          if make -j$(nproc) 2>&1 | tee /tmp/build.log | grep -q "warning:"; then
            echo "::error::Build produced compiler warnings"
            grep "warning:" /tmp/build.log
            exit 1
          fi
