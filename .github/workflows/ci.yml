name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

# CI scope note:
#   Unit tests run on Ubuntu 24.04 (Qt 6.4). They cover the pure-data
#   modules — audio_parser (pactl output parsers) and icons (DesktopIconResolver
#   + token-fuzzy match). No GUI / KWin / layer-shell dependencies needed.
#
#   The full app build is NOT exercised in CI yet. Ubuntu noble's main repo
#   only ships layer-shell-qt for Qt5 (Plasma 5); the Qt6 (Plasma 6) variant
#   isn't available there or in kubuntu-ppa/backports as of writing. Once
#   Ubuntu oracular (24.10) lands as a runner, or once we set up an Arch
#   container, the full build can be wired up here too.

jobs:
  unit-tests:
    name: Unit tests (Ubuntu 24.04, Qt6)
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Qt 6 base + test deps
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            qmake6 \
            qt6-base-dev \
            qt6-base-dev-tools \
            libqt6test6 \
            build-essential

      - name: Verify Qt version
        run: qmake6 -query QT_VERSION

      - name: Build + run unit tests
        env:
          QT_QPA_PLATFORM: offscreen
        run: |
          cd tests
          qmake6 tests.pro
          make -j$(nproc)
          for t in audio_parser_test/audio_parser_test icons_test/icons_test; do
            echo "::group::Running $t"
            ./$t
            echo "::endgroup::"
          done
